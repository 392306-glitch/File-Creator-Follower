<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe AI - Game</title>
</head>
<body>
  <h1>Tic Tac Toe AI</h1>
  <p>Welcome, <span id="usernameDisplay"></span>!</p>
  <a href="/index.html"><button>Home</button></a>
  <button id="logout">Logout</button>

  <!-- Your Tic Tac Toe game will go here later -->
  <div id="gameBoard">
    <p>Game board will appear here.</p>
  </div>

  <script>
    // Check if user is logged in
    const sessionToken = localStorage.getItem('sessionToken');
    const username = localStorage.getItem('username');

    if (!sessionToken || !username) {
      window.location.href = '/index.html'; // Redirect to home if not logged in
    } else {
      document.getElementById('usernameDisplay').textContent = username;
    }

    // Logout
    document.getElementById('logout').addEventListener('click', async () => {
      const sessionToken = localStorage.getItem('sessionToken');
      await fetch('/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken })
      });
      localStorage.removeItem('sessionToken');
      localStorage.removeItem('username');
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
